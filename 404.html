  .not-found {
    min-height: 100vh;

    color: var(--brew);
    opacity: 0.18;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    user-select: none;
  }

  .not-found-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .not-found-eyebrow {

    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    opacity: 0.45;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .not-found-eyebrow::before,
  .not-found-eyebrow::after {
    content: "";
    width: 26px;
    height: 1px;
    background: currentColor;
    opacity: 0.6;
  }

  .not-found-heading {
    font-family: var(--serif);
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 300;
    line-height: 1.1;
    margin-top: 4px;
  }
  .not-found-heading em {
    font-style: italic;
    color: var(--brew);
  }

  .not-found-sub {
    font-family: var(--serif);
    font-size: clamp(15px, 1.6vw, 18px);
    opacity: 0.55;
    font-weight: 300;
    max-width: 32ch;
    line-height: 1.6;
    margin-top: 4px;
  }

  .not-found-actions {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 16px;
  }

  .disc-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(260px, 50vw, 480px);
    height: clamp(260px, 50vw, 480px);
    opacity: 0.06;
    pointer-events: none;
  }
  .disc-ring circle {
    animation: pulse-ring 4s ease-in-out infinite;
  }
  .disc-ring circle:nth-child(2) { animation-delay: 0.4s; }
  .disc-ring circle:nth-child(3) { animation-delay: 0.8s; }
  .disc-ring circle:nth-child(4) { animation-delay: 1.2s; }
  .disc-ring circle:nth-child(5) { animation-delay: 1.6s; }

  @keyframes pulse-ring {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  a { text-decoration: none; }
</style>
